version: "3.9"

services:

  api:

    build: .

    ports:
      - "8000:8000"

    depends_on:
      - postgres
      - redis

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vortex

  worker:

    build: .

    command: python app/worker.py

    depends_on:
      - postgres
      - redis

  postgres:

    image: postgres:15

    environment:
      POSTGRES_DB: vortex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

  redis:

    image: redis:7

    ports:
      - "6379:6379"
