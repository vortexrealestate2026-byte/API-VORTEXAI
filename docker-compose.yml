version: "3.9"

services:

  api:

    build: .

    ports:
      - "8080:8080"

    command: uvicorn app.main:app --host 0.0.0.0 --port 8080

    depends_on:
      - postgres
      - redis

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vortex
      REDIS_URL: redis://redis:6379

  worker:

    build: .

    command: celery -A app.worker worker --loglevel=info

    depends_on:
      - postgres
      - redis

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vortex
      REDIS_URL: redis://redis:6379

  postgres:

    image: postgres:15

    environment:
      POSTGRES_DB: vortex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

  redis:

    image: redis:7

    ports:
      - "6379:6379"
